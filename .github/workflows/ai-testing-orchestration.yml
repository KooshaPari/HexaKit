name: Cross-Project Testing Orchestration

on:
  workflow_dispatch:
    inputs:
      projects:
        description: 'Projects to test'
        required: true
        default: 'nanovms,agileplus,thegent'
        type: string
  schedule:
    - cron: '0 5 * * 0'  # Weekly cross-project

jobs:
  orchestration:
    name: Test Orchestration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Test Config
        run: cat .mcp-testing.yaml | head -30

  nanovms:
    name: NanoVMS Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nanovms
    steps:
      - uses: actions/checkout@v4
        with:
          repository: KooshaPari/nanovms
          path: nanovms

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Tests
        run: |
          echo "NanoVMS testing with Vitest + Playwright + Cargo"
          npm install vitest @playwright/test
          npx vitest run || true
          npx playwright test || true
          cargo test --workspace || true

  agileplus:
    name: AgilePlus Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AgilePlus
    steps:
      - uses: actions/checkout@v4
        with:
          repository: KooshaPari/AgilePlus
          path: AgilePlus

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Tests
        run: |
          echo "AgilePlus testing with Vitest + Playwright + Cucumber"
          npm install vitest @playwright/test @cucumber/cucumber
          npx vitest run || true
          npx playwright test || true

  thegent:
    name: thegent Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: thegent
    steps:
      - uses: actions/checkout@v4
        with:
          repository: KooshaPari/thegent
          path: thegent

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Tests
        run: |
          echo "thegent testing with Vitest + Playwright + pytest"
          pip install pytest pytest-cov
          npm install vitest @playwright/test
          npx vitest run || true
          pytest tests/ -v || true
          npx playwright test || true

  aggregate-results:
    name: Aggregate Results
    runs-on: ubuntu-latest
    needs: [nanovms, agileplus, thegent]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Cross-Project Testing Summary"
          echo ""
          echo "| Project | Status |"
          echo "|---------|--------|"
          echo "| NanoVMS | ${{ needs.nanovms.result == 'success' && '✅' || '❌' }} |"
          echo "| AgilePlus | ${{ needs.agileplus.result == 'success' && '✅' || '❌' }} |"
          echo "| thegent | ${{ needs.thegent.result == 'success' && '✅' || '❌' }} |"
