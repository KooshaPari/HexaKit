name: Legacy Tooling Gate (WARN Mode)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


# Thin caller — delegates to the shared reusable workflow in phenoShared.
# See KooshaPari/phenoShared#85 / audit #182 for rationale (14-repo dedup).

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  legacy-tooling-scan:
    uses: KooshaPari/phenoShared/.github/workflows/legacy-tooling-gate.yml@d95bb6755390f73c56ea496b246d098fbf97bbe9
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    with:
      source-ref: main
      report-only: true