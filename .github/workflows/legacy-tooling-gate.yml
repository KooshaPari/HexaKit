name: Legacy Tooling Gate (WARN Mode)

# Thin caller — delegates to the shared reusable workflow in phenoShared.
# See KooshaPari/phenoShared#85 / audit #182 for rationale (14-repo dedup).

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  legacy-tooling-scan:
    uses: KooshaPari/phenoShared/.github/workflows/legacy-tooling-gate.yml@main
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    with:
      source-ref: main
      report-only: true
