name: Tag Automation

# Delegates to phenoShared reusable workflow.
# See: https://github.com/KooshaPari/phenoShared/blob/main/.github/workflows/tag-automation.yml

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  tag:
    uses: KooshaPari/phenoShared/.github/workflows/tag-automation.yml@d95bb6755390f73c56ea496b246d098fbf97bbe9
    permissions:
      contents: write
