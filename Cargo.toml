[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT OR Apache-2.0"
description = "Phenotype Infrastructure Kit"
repository = "https://github.com/KooshaPari/phenotype-infrakit"

[package]
name = "phenotype-infrakit"
version.workspace = true
edition.workspace = true
description.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
phenotype-error-core = { path = "crates/phenotype-error-core" }

[workspace]
[workspace]
resolver = "2"
members = [
    "crates/phenotype-event-sourcing",
]
[workspace.package]
version = "0.2.0"
edition = "2021"
license = "MIT"
rust-version = "1.75"
repository = "https://github.com/KooshaPari/phenotype-infrakit"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
thiserror = "2.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
sha2 = "0.10"
hex = "0.4"
async-trait = "0.1"

[profile.dev]
opt-level = 0
debug = true

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
